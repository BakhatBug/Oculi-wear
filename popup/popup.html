<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Sleep Optimizer</title>
  <style>
    :root {
      --navy:       #0f172a;
      --navy-light: #1e293b;
      --teal:       #0ea5e9;
      --teal-glow:  rgba(14,165,233,0.15);
      --purple:     #8b5cf6;
      --purple-glow:rgba(139,92,246,0.15);
      --amber:      #f59e0b;
      --red:        #ef4444;
      --bg:         #020617;
      --glass:      rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.08);
      --text:       #f8fafc;
      --text-dim:   #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Compact Header ── */
    .header {
      padding: 16px 20px;
      background: linear-gradient(180deg, rgba(30,41,59,0.5) 0%, transparent 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: var(--text-dim); }
    .live-clock { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }

    .content { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 12px; }

    /* ── Status Section ── */
    .status-area {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 0;
    }
    .ring-container { position: relative; width: 80px; height: 80px; }
    .ring-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
    circle { fill: none; stroke-width: 6; stroke-linecap: round; }
    .ring-bg { stroke: var(--navy-light); }
    .ring-fill { 
      stroke: var(--teal); 
      transition: stroke-dashoffset 0.6s ease;
      stroke-dasharray: 226.2;
      stroke-dashoffset: 226.2;
    }
    .ring-fill.warning { stroke: var(--amber); }
    .ring-fill.bedtime { stroke: var(--red); }
    
    .ring-info {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-time { font-size: 18px; font-weight: 800; }
    .ring-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

    .status-text { flex: 1; }
    .phase-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      margin-bottom: 4px;
    }
    .phase-badge.safe { background: rgba(14,165,233,0.1); color: var(--teal); }
    .phase-badge.warning { background: rgba(245,158,11,0.1); color: var(--amber); }
    .phase-badge.bedtime { background: rgba(239,68,68,0.1); color: var(--red); }
    .status-bed { font-size: 12px; color: var(--text-dim); }

    /* ── Quick Stats Grid ── */
    .quick-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .stat-pill {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      padding: 10px; border-radius: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .stat-icon { font-size: 16px; }
    .stat-data { display: flex; flex-direction: column; }
    .stat-val { font-size: 14px; font-weight: 700; }
    .stat-lab { font-size: 10px; color: var(--text-dim); }

    /* ── Controls ── */
    .controls { display: flex; flex-direction: column; gap: 8px; }
    .toggle-group {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 4px;
      display: flex;
    }
    .toggle-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding: 8px 0; cursor: pointer; border-radius: 8px;
      transition: background 0.2s;
    }
    .toggle-item:hover { background: rgba(255,255,255,0.05); }
    .toggle-item span { font-size: 10px; font-weight: 600; color: var(--text-dim); }
    .toggle-item input { display: none; }
    .toggle-item.active { background: rgba(255,255,255,0.05); }
    .toggle-item.active span { color: var(--text); }
    .toggle-item.active .icon-box { background: var(--teal); color: #fff; }
    .icon-box {
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: var(--navy-light); border-radius: 6px; font-size: 12px; transition: all 0.2s;
    }

    .action-row { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 12px; border-radius: 12px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--teal); color: #fff; }
    .btn-secondary { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); }

    /* ── Collapsible Section ── */
    .collapsible {
      border-top: 1px solid var(--glass-border);
      margin-top: 4px;
    }
    .collapse-trigger {
      padding: 12px 0; display: flex; justify-content: space-between;
      align-items: center; cursor: pointer; color: var(--text-dim); font-size: 12px; font-weight: 600;
    }
    .collapse-content { 
      display: none; flex-direction: column; gap: 12px; padding-bottom: 12px;
      animation: slideDown 0.3s ease-out;
    }
    .collapse-content.show { display: flex; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; }
    .card-title { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    
    /* Chart and Bars (Mini) */
    .chart-set { display: flex; align-items: flex-end; gap: 4px; height: 40px; }
    .chart-bar { flex: 1; background: var(--navy-light); border-radius: 2px; position: relative; }
    .chart-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; background: var(--teal); border-radius: 2px; }
    
    .cat-mini { display: flex; flex-direction: column; gap: 6px; }
    .cat-mini-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .cat-mini-bar { flex: 1; height: 4px; background: var(--navy-light); border-radius: 2px; overflow: hidden; }
    .cat-mini-fill { height: 100%; background: var(--purple); }

    /* Footer */
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 16px 16px; border-top: 1px solid var(--glass-border); padding-top: 12px;
    }
    .footer a { color: var(--text-dim); font-size: 11px; text-decoration: none; cursor: pointer; }
    .footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="header">
    <div class="live-clock" id="live-clock">00:00:00</div>
    <h1>SLEEP OPTIMIZER</h1>
  </div>

  <div class="content">
    <div class="status-area">
      <div class="ring-container">
        <svg class="ring-svg" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="36"/>
          <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="36"/>
        </svg>
        <div class="ring-info">
          <span class="ring-time" id="ring-time">--</span>
          <span class="ring-label" id="ring-label">left</span>
        </div>
      </div>
      <div class="status-text">
        <div class="phase-badge safe" id="phase-badge">Safe</div>
        <div class="status-bed" id="status-bed">Bed at --:--</div>
      </div>
    </div>

    <div class="quick-stats">
      <div class="stat-pill">
        <span class="stat-icon">🏆</span>
        <div class="stat-data">
          <span class="stat-val" id="sleep-score">--</span>
          <span class="stat-lab">Score</span>
        </div>
      </div>
      <div class="stat-pill">
        <span class="stat-icon">🕒</span>
        <div class="stat-data">
          <span class="stat-val" id="stat-time">--</span>
          <span class="stat-lab">Screen Time</span>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="toggle-group">
        <label class="toggle-item" id="label-dim">
          <input type="checkbox" id="toggle-dim" checked>
          <div class="icon-box">🌙</div>
          <span>Dim</span>
        </label>
        <label class="toggle-item" id="label-eye">
          <input type="checkbox" id="toggle-eye">
          <div class="icon-box">👁️</div>
          <span>Eye</span>
        </label>
        <label class="toggle-item" id="label-focus">
          <input type="checkbox" id="toggle-focus">
          <div class="icon-box">🎯</div>
          <span>Focus</span>
        </label>
      </div>

      <div class="action-row">
        <button class="btn btn-secondary" id="btn-snooze">😴 Snooze</button>
        <button class="btn btn-primary" id="btn-done">✅ Done</button>
      </div>
    </div>

    <div class="collapsible">
      <div class="collapse-trigger" id="collapse-trigger">
        <span>Insights & Tools</span>
        <span id="collapse-icon">▼</span>
      </div>
      <div class="collapse-content" id="collapse-content">
        <div class="card">
          <div class="card-title">Weekly Score</div>
          <div class="chart-set" id="weekly-chart"></div>
        </div>
        <div class="card" id="cat-card">
          <div class="card-title">Categories</div>
          <div class="cat-mini" id="cat-bars">
            <!-- Dynamically filled -->
          </div>
        </div>
        <div class="card" style="text-align: center;">
          <div class="card-title">4-7-8 Breathing</div>
          <button class="btn btn-secondary" style="width:100%" id="btn-breathe">Start Exercise</button>
        </div>
        <button class="btn btn-secondary" style="width:100%" id="btn-close-disruptors">🧹 Close Disruptors</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <a id="link-settings">Settings</a>
    <a id="btn-test">Test Dim</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
